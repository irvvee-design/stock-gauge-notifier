name: Stock Gauge Notification Check

on:
  schedule:
    # 毎日 UTC 0:00 (日本時間 9:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch: {}
    # ↑ Actionsタブから手動実行もできるようにしておく(動作確認用)

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージをインストール
        run: npm install
        working-directory: ./notifier

      - name: 通知チェックスクリプトを実行
        run: node check-notifications.js
        working-directory: ./notifier
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
